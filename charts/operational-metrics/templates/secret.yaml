{{- /*
Chart-managed secret. Only created when at least one credential is provided
inline (db password, DT API key, or GitHub token) and not delegated to an
existingSecret.
*/ -}}
{{- $createDb := and (not .Values.database.existingSecret) (.Values.database.password) -}}
{{- $createDt := and (not .Values.dependencyTrack.existingSecret) (.Values.dependencyTrack.apiKey) -}}
{{- $createGh := and (not .Values.github.existingSecret) (.Values.github.token) -}}
{{- if or $createDb $createDt $createGh }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operational-metrics.secretName" . }}
  labels:
    {{- include "operational-metrics.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $createDb }}
  db-password: {{ .Values.database.password | quote }}
  {{- end }}
  {{- if $createDt }}
  dt-api-key: {{ .Values.dependencyTrack.apiKey | quote }}
  {{- end }}
  {{- if $createGh }}
  github-token: {{ .Values.github.token | quote }}
  {{- end }}
{{- end }}
