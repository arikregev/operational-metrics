apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operational-metrics.fullname" . }}
  labels:
    {{- include "operational-metrics.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "operational-metrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "operational-metrics.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "operational-metrics.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "operational-metrics.fullname" . }}-config
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.existingSecret }}
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
                  {{- else }}
                  name: {{ include "operational-metrics.secretName" . }}
                  key: db-password
                  {{- end }}
            - name: DT_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.dependencyTrack.existingSecret }}
                  name: {{ .Values.dependencyTrack.existingSecret }}
                  key: {{ .Values.dependencyTrack.existingSecretKey }}
                  {{- else }}
                  name: {{ include "operational-metrics.secretName" . }}
                  key: dt-api-key
                  optional: true
                  {{- end }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.github.existingSecret }}
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.existingSecretKey }}
                  {{- else }}
                  name: {{ include "operational-metrics.secretName" . }}
                  key: github-token
                  optional: true
                  {{- end }}
            - name: SNYK_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.snyk.existingSecret }}
                  name: {{ .Values.snyk.existingSecret }}
                  key: {{ .Values.snyk.existingSecretKey }}
                  {{- else }}
                  name: {{ include "operational-metrics.secretName" . }}
                  key: snyk-token
                  optional: true
                  {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
