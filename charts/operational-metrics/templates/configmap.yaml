apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "operational-metrics.fullname" . }}-config
  labels:
    {{- include "operational-metrics.labels" . | nindent 4 }}
data:
  # --- Datasource ---
  DB_URL: {{ .Values.database.url | quote }}
  DB_USERNAME: {{ .Values.database.username | quote }}

  # --- Dependency Track ---
  DT_URL: {{ .Values.dependencyTrack.url | quote }}
  DEPENDENCY_TRACK_PAGE_SIZE: {{ .Values.dependencyTrack.pageSize | quote }}

  # --- GitHub ---
  GITHUB_API_URL: {{ .Values.github.apiUrl | quote }}

  # --- Snyk ---
  SNYK_ENABLED: {{ .Values.snyk.enabled | quote }}
  SNYK_ORG_ID: {{ .Values.snyk.orgId | quote }}
  SNYK_API_URL: {{ .Values.snyk.apiUrl | quote }}
  SNYK_API_VERSION: {{ .Values.snyk.apiVersion | quote }}

  # --- ecosyste.ms ---
  ECOSYSTEMS_CONTACT_EMAIL: {{ .Values.ecosystems.contactEmail | quote }}

  # --- Source priorities ---
  METRICS_SOURCES_SOURCE_SNYK_ENABLED: {{ .Values.sources.snyk.enabled | quote }}
  METRICS_SOURCES_SOURCE_SNYK_PRIORITY: {{ .Values.sources.snyk.priority | quote }}
  METRICS_SOURCES_SOURCE_SCORECARD_ENABLED: {{ .Values.sources.scorecard.enabled | quote }}
  METRICS_SOURCES_SOURCE_SCORECARD_PRIORITY: {{ .Values.sources.scorecard.priority | quote }}
  METRICS_SOURCES_SOURCE_DEPSDEV_ENABLED: {{ .Values.sources.depsdev.enabled | quote }}
  METRICS_SOURCES_SOURCE_DEPSDEV_PRIORITY: {{ .Values.sources.depsdev.priority | quote }}
  METRICS_SOURCES_SOURCE_ECOSYSTEMS_ENABLED: {{ .Values.sources.ecosystems.enabled | quote }}
  METRICS_SOURCES_SOURCE_ECOSYSTEMS_PRIORITY: {{ .Values.sources.ecosystems.priority | quote }}
  METRICS_SOURCES_SOURCE_GITHUB_ENABLED: {{ .Values.sources.github.enabled | quote }}
  METRICS_SOURCES_SOURCE_GITHUB_PRIORITY: {{ .Values.sources.github.priority | quote }}

  # --- Full sync ---
  METRICS_SYNC_CRON: {{ .Values.sync.cron | quote }}
  METRICS_SYNC_CONCURRENCY: {{ .Values.sync.concurrency | quote }}

  # --- Refresh-only sync ---
  METRICS_REFRESH_ENABLED: {{ .Values.metricsRefresh.enabled | quote }}
  METRICS_REFRESH_CRON: {{ .Values.metricsRefresh.cron | quote }}
  METRICS_REFRESH_CONCURRENCY: {{ .Values.metricsRefresh.concurrency | quote }}
  METRICS_REFRESH_STALENESS_DAYS: {{ .Values.metricsRefresh.stalenessDays | quote }}

  # --- Discovery-only sync ---
  METRICS_DISCOVERY_ENABLED: {{ .Values.metricsDiscovery.enabled | quote }}
  METRICS_DISCOVERY_CRON: {{ .Values.metricsDiscovery.cron | quote }}

  # --- Versions sweep ---
  METRICS_VERSIONS_ENABLED: {{ .Values.versionsSweep.enabled | quote }}
  METRICS_VERSIONS_CRON: {{ .Values.versionsSweep.cron | quote }}
  METRICS_VERSIONS_CONCURRENCY: {{ .Values.versionsSweep.concurrency | quote }}
  METRICS_VERSIONS_STALENESS_DAYS: {{ .Values.versionsSweep.stalenessDays | quote }}
  METRICS_VERSIONS_BATCH_SIZE: {{ .Values.versionsSweep.batchSize | quote }}
  METRICS_VERSIONS_RATE_BUDGET_PER_SECOND: {{ .Values.versionsSweep.rateBudgetPerSecond | quote }}

  # --- History ---
  METRICS_HISTORY_RETENTION_DAYS: {{ .Values.history.retentionDays | quote }}
  METRICS_HISTORY_PURGE_CRON: {{ .Values.history.purgeCron | quote }}

  # --- API ---
  METRICS_API_ON_DEMAND_CONCURRENCY: {{ .Values.api.onDemandConcurrency | quote }}

  # --- RepoMetaAnalyzer ---
  METRICS_REPO_META_ANALYZER_ENABLED: {{ .Values.repoMetaAnalyzer.enabled | quote }}
  METRICS_REPO_META_ANALYZER_BULK_REFRESH_AFTER_DAYS: {{ .Values.repoMetaAnalyzer.bulk.refreshAfterDays | quote }}
  METRICS_REPO_META_ANALYZER_BULK_SOURCE_ECOSYSTEMS_PRIORITY: {{ .Values.repoMetaAnalyzer.bulk.source.ecosystems.priority | quote }}
  METRICS_REPO_META_ANALYZER_BULK_SOURCE_DEPSDEV_PRIORITY: {{ .Values.repoMetaAnalyzer.bulk.source.depsdev.priority | quote }}
  METRICS_REPO_META_ANALYZER_PER_VERSION_SOURCE_SNYK_PRIORITY: {{ .Values.repoMetaAnalyzer.perVersion.source.snyk.priority | quote }}
  METRICS_REPO_META_ANALYZER_PER_VERSION_SOURCE_ECOSYSTEMS_PRIORITY: {{ .Values.repoMetaAnalyzer.perVersion.source.ecosystems.priority | quote }}
  METRICS_REPO_META_ANALYZER_PER_VERSION_SOURCE_DEPSDEV_PRIORITY: {{ .Values.repoMetaAnalyzer.perVersion.source.depsdev.priority | quote }}
