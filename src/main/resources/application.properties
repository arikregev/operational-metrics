# =============================================================================
# Operational Metrics Service Configuration
# =============================================================================

# --- Datasource ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/operational_metrics}
quarkus.datasource.jdbc.max-size=20

# --- Dev Services ---
# Globally disabled. We don't use Testcontainer-backed auto-DBs at any point
# (tests mock Jdbi, prod uses a real Postgres). This keeps the Testcontainers
# JARs that Quarkus pulls transitively from ever executing and means no Docker
# daemon is required for `quarkus:dev` or `@QuarkusTest`.
quarkus.devservices.enabled=false

# --- Liquibase ---
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.yaml

# --- Source Configuration ---
metrics.sources.source.scorecard.enabled=true
metrics.sources.source.scorecard.priority=1

metrics.sources.source.depsdev.enabled=true
metrics.sources.source.depsdev.priority=2

metrics.sources.source.ecosystems.enabled=true
metrics.sources.source.ecosystems.priority=3

metrics.sources.source.github.enabled=true
metrics.sources.source.github.priority=4

# --- Dependency Track ---
dependency-track.url=${DT_URL:http://localhost:8081}
dependency-track.api-key=${DT_API_KEY:changeme}
dependency-track.page-size=100

# --- GitHub ---
github.token=${GITHUB_TOKEN:}
github.api-url=https://api.github.com

# --- Sync ---
metrics.sync.cron=0 0 2 * * ?
metrics.sync.concurrency=4
metrics.sync.batch-size=500
metrics.sync.rate-limit-delay-ms=1000
metrics.sync.max-retries=3

# --- History ---
metrics.history.retention-days=90
metrics.history.purge-cron=0 0 3 * * ?

# --- On-demand fetch ---
metrics.api.on-demand-concurrency=4

# --- ecosyste.ms contact email (for polite pool 15K/hr rate limit) ---
ecosystems.contact-email=${ECOSYSTEMS_CONTACT_EMAIL:ops@example.com}

# --- REST Client URLs ---
quarkus.rest-client.dependency-track-api.url=${dependency-track.url}
quarkus.rest-client.scorecard-api.url=https://api.securityscorecards.dev
quarkus.rest-client.depsdev-api.url=https://api.deps.dev
quarkus.rest-client.ecosystems-api.url=https://packages.ecosyste.ms
quarkus.rest-client.github-api.url=${github.api-url}

# --- REST Client timeouts ---
quarkus.rest-client.scorecard-api.connect-timeout=5000
quarkus.rest-client.scorecard-api.read-timeout=30000
quarkus.rest-client.depsdev-api.connect-timeout=5000
quarkus.rest-client.depsdev-api.read-timeout=30000
quarkus.rest-client.ecosystems-api.connect-timeout=5000
quarkus.rest-client.ecosystems-api.read-timeout=30000
quarkus.rest-client.github-api.connect-timeout=5000
quarkus.rest-client.github-api.read-timeout=30000

# --- Multipart upload ---
quarkus.http.body.uploads-directory=${java.io.tmpdir}/operational-metrics-uploads
quarkus.http.limits.max-body-size=50M
