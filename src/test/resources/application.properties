# =============================================================================
# Test configuration: avoid real DB / scheduler / external clients at startup.
# All resource tests mock Jdbi + services via @InjectMock, so the datasource
# never gets used; H2 is only here to satisfy the Agroal bean wiring.
# =============================================================================

quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# No Liquibase: schema is Postgres-specific and we don't hit the DB anyway.
quarkus.liquibase.migrate-at-start=false

# Avoid scheduled syncs firing during tests.
quarkus.scheduler.enabled=false

# Stable values for properties otherwise pulled from env vars.
github.token=test-token
dependency-track.url=http://test-dt.local
dependency-track.api-key=test-api-key
ecosystems.contact-email=test@example.com
